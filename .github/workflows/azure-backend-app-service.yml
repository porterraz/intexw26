# Option A: deploy ASP.NET Core API to Azure App Service (separate URL, e.g. api.example.com).
# Prereqs in Azure: Linux App Service, .NET 10 stack, connection strings + app settings (see AZURE_DEPLOY.md).
# Prereqs in GitHub: secret AZURE_WEBAPP_PUBLISH_PROFILE; variable AZURE_WEBAPP_NAME (App Service name).

name: Deploy backend (Azure App Service)

on:
  push:
    branches: [main]
    paths:
      - 'intex-backend/**'
      - '.github/workflows/azure-backend-app-service.yml'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish intex-backend/Intex.Backend.csproj -c Release --verbosity minimal -o "${{ github.workspace }}/publish"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish
