name: Nightly ML Refresh

on:
  schedule:
    # Run every night at 3:00 AM UTC
    - cron: "0 3 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh-models:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DB_SERVER: ${{ secrets.DB_SERVER }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ml-pipelines/requirements.txt

      - name: Install ODBC Driver 18
        run: |
          sudo rm -f /etc/apt/sources.list.d/mssql-release.list
          sudo rm -f /usr/share/keyrings/microsoft-prod.gpg
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          echo "deb [signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/$(lsb_release -rs)/prod $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install Python dependencies
        run: pip install -r ml-pipelines/requirements.txt

      - name: Run all ML pipelines
        working-directory: ml-pipelines
        run: python run_all.py

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f intex-backend/resident_recommendations.json || true
          git add -f intex-backend/donor_segments.json || true
          git add -f ml-pipelines/social_media_insights.json || true
          git add -f ml-pipelines/donor_churn_predictions.csv || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: nightly ML model refresh [skip ci]"
            git push
          fi
