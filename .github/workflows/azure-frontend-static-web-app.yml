# Deploy Vite/React frontend to Azure App Service.
# Prereqs in GitHub:
# - Secret: INTEX_AZURE_WEBAPP_FRONTEND_PUBLISH_PROFILE
# - Variable: INTEX_AZURE_WEBAPP_FRONTEND_NAME (for example: intexw26-web-21573)
# - Variable: VITE_API_BASE_URL (for example: https://intexw26-api-21573.azurewebsites.net)

name: Deploy frontend (Azure App Service)

on:
  push:
    branches: [main]
    paths:
      - 'intex-frontend/**'
      - '.github/workflows/azure-frontend-static-web-app.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: intex-frontend/package-lock.json

      - name: Install dependencies
        working-directory: intex-frontend
        run: npm ci

      - name: Build
        working-directory: intex-frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: intex-frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    name: Deploy frontend
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.INTEX_AZURE_WEBAPP_FRONTEND_NAME }}
          publish-profile: ${{ secrets.INTEX_AZURE_WEBAPP_FRONTEND_PUBLISH_PROFILE }}
          package: frontend-dist
