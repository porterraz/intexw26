# Option A: deploy Vite/React to Azure Static Web Apps (user-facing "main" URL).
# Prereqs in Azure: create a Static Web App; copy its deployment token.
# Prereqs in GitHub: repo secret AZURE_STATIC_WEB_APPS_API_TOKEN; repo variable VITE_API_BASE_URL (your public API origin, no trailing slash).

name: Deploy frontend (Azure Static Web Apps)

on:
  push:
    branches: [main]
    paths:
      - 'intex-frontend/**'
      - '.github/workflows/azure-frontend-static-web-app.yml'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v4

      - name: Build and deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: intex-frontend
          api_location: ''
          output_location: dist
          app_build_command: npm ci && npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
