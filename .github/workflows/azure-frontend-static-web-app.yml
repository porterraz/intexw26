# Deploy Vite/React frontend to Azure App Service.
# Prereqs in GitHub:
# - Secret: INTEX_AZURE_WEBAPP_FRONTEND_PUBLISH_PROFILE
# - Variable: INTEX_AZURE_WEBAPP_FRONTEND_NAME (for example: intexw26-web-21573)
# - Variable: VITE_API_BASE_URL (for example: https://intexw26-api-21573.azurewebsites.net)

name: Deploy frontend (Azure App Service)

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Build frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: intex-frontend/package-lock.json

      - name: Install dependencies
        working-directory: intex-frontend
        run: npm ci

      - name: Build
        working-directory: intex-frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: intex-frontend/dist

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    name: Deploy frontend
    env:
      AZURE_FRONTEND_APP_NAME: ${{ vars.INTEX_AZURE_WEBAPP_FRONTEND_NAME || vars.AZURE_WEBAPP_FRONTEND_NAME || vars.AZURE_WEBAPP_NAME }}
      AZURE_FRONTEND_PUBLISH_PROFILE: ${{ secrets.INTEX_AZURE_WEBAPP_FRONTEND_PUBLISH_PROFILE || secrets.AZURE_WEBAPP_FRONTEND_PUBLISH_PROFILE || secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Validate deploy configuration
        run: |
          if [ -z "${AZURE_FRONTEND_APP_NAME}" ]; then
            echo "::error::Missing app name variable. Set one of: INTEX_AZURE_WEBAPP_FRONTEND_NAME, AZURE_WEBAPP_FRONTEND_NAME, AZURE_WEBAPP_NAME."
            exit 1
          fi
          if [ -z "${AZURE_FRONTEND_PUBLISH_PROFILE}" ]; then
            echo "::error::Missing publish profile secret. Set one of: INTEX_AZURE_WEBAPP_FRONTEND_PUBLISH_PROFILE, AZURE_WEBAPP_FRONTEND_PUBLISH_PROFILE, AZURE_WEBAPP_PUBLISH_PROFILE."
            exit 1
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_FRONTEND_APP_NAME }}
          publish-profile: ${{ env.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: frontend-dist
